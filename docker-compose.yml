services:
  server:
    build:
      context: .
      dockerfile: src/docker/Dockerfile
    container_name: factorization-server
    environment:
      - HOST=0.0.0.0
      - PORT=12345
    ports:
      - "12345:12345/udp"
    networks:
      - demo-net
    restart: unless-stopped

  sender:
    build:
      context: .
      dockerfile: udp-sender/Dockerfile
    container_name: factorization-sender
    depends_on:
      - server
    environment:
      - SERVER_HOST=${HOST:-server}
      - SERVER_PORT=12345
    command: ["--mode", "mixed"]
    networks:
      - demo-net
    profiles:
      - sender  # Не запускается автоматически

networks:
  demo-net:
    driver: bridge